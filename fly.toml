app = "sf-hedgefund-agent-team"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  SF_API_URL = "https://simplefunctions.dev"
  EXECUTION_MODE = "paper"
  ENABLE_LIVE_TRADING = "false"
  JURISDICTION = "US"
  BLOCK_POLYMARKET_LIVE = "true"
  DATA_DIR = "/app/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "20s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[mounts]]
  source = "sf_hedgefund_agent_data"
  destination = "/app/data"
