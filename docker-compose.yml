services:
  hedgefund-agent-team:
    build: .
    image: sf-hedgefund-agent-team:local
    ports:
      - "8787:8787"
    env_file:
      - .env
    environment:
      PORT: "8787"
      DATA_DIR: /app/data
    volumes:
      - sf-hedgefund-agent-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  sf-hedgefund-agent-data:
